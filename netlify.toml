[build]
  command = "pnpm prisma generate && pnpm next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.30.3"
  PRISMA_CLI_QUERY_ENGINE_TYPE = "library"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "nft"
  included_files = ["node_modules/@libsql/**", "node_modules/@prisma/adapter-libsql/**", "node_modules/hrana-client/**", "node_modules/@hrana/**"]
